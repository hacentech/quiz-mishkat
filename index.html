<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Pro - مشكاة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .timer-ring {
            transition: stroke-dashoffset 0.5s linear;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .correct-glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .waiting-pulse {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        /* تأثير التنفس للشعار في وضع القفل */
        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        .logo-breathe {
            animation: breathe 3s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        let serverOffset = 0;
        const ADMIN_PASSWORD = "111";

        const RAW_GAS_URL = "%VITE_GAS_URL%";
        const ENV_GAS_URL = RAW_GAS_URL.startsWith("%VITE_") ? "" : RAW_GAS_URL;
        const ENV_IS_LOCAL = "%VITE_IS_LOCAL%" === "true";
        const HAS_ENV_CONFIG = ENV_GAS_URL !== "";

        const TimerCircle = ({ endTime, isRunning, onFinish }) => {
            const [timeLeft, setTimeLeft] = useState(20);
            useEffect(() => {
                let interval;
                if (isRunning && endTime > 0) {
                    const update = () => {
                        const diff = Math.max(0, Math.ceil((endTime - (Date.now() + serverOffset)) / 1000));
                        setTimeLeft(diff);
                        if (diff <= 0 && onFinish) onFinish();
                    };
                    update();
                    interval = setInterval(update, 500);
                } else { setTimeLeft(20); }
                return () => clearInterval(interval);
            }, [endTime, isRunning]);

            const percentage = (timeLeft / 20) * 100;
            const r = 70;
            const dashArray = 2 * Math.PI * r;
            const dashOffset = dashArray - (dashArray * percentage) / 100;

            return (
                <div className="relative flex items-center justify-center w-48 h-48">
                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 160 160">
                        <circle cx="80" cy="80" r={r} stroke="#1e293b" strokeWidth="8" fill="transparent" />
                        <circle cx="80" cy="80" r={r} stroke={timeLeft <= 4 ? "#f43f5e" : "#6366f1"}
                            strokeWidth="8" fill="transparent" strokeDasharray={dashArray}
                            strokeDashoffset={dashOffset} strokeLinecap="round" className="timer-ring" />
                    </svg>
                    <span className="absolute font-black text-5xl text-indigo-400">
                        {`00:${timeLeft.toString().padStart(2, '0')}`}
                    </span>
                </div>
            );
        };

        const PlayerView = ({ getApiUrl, playerId }) => {
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);
            const [myAnswer, setMyAnswer] = useState(null);
            const [loading, setLoading] = useState(false);
            const qIdRef = useRef(null);

            const fetchStatus = async () => {
                try {
                    const apiUrl = getApiUrl('getStatus', { t: Date.now() });
                    const res = await fetch(apiUrl);
                    const json = await res.json();

                    if (json.success) {
                        setError(null);
                        serverOffset = json.serverTime - Date.now();
                        if (qIdRef.current !== json.data.status.currentQuestionId) {
                            setMyAnswer(null);
                            qIdRef.current = json.data.status.currentQuestionId;
                        }
                        setData(json.data);
                        const ans = json.data.status.playerAnswers[playerId - 1];
                        if (ans && !myAnswer) setMyAnswer(ans);
                    } else {
                        setError(json.error || "خطأ غير معروف");
                    }
                } catch (e) { setError("فشل الاتصال بالخادم"); }
            };

            useEffect(() => { fetchStatus(); const inv = setInterval(fetchStatus, 2000); return () => clearInterval(inv); }, []);

            const submit = async (choice) => {
                if (myAnswer || !data?.status.isVotingOpen || loading) return;
                setMyAnswer(choice);
                setLoading(true);
                try {
                    const apiUrl = getApiUrl('submitAnswer', { playerId, answer: choice });
                    await fetch(apiUrl);
                } catch (e) { }
                setLoading(false);
            };

            if (error) return <div className="p-8 text-center text-rose-500 font-bold bg-slate-900 h-screen flex items-center justify-center">{error}</div>;
            if (!data) return <div className="text-center p-20 text-slate-500 animate-pulse bg-slate-900 h-screen flex items-center justify-center">جاري الاتصال...</div>;

            // --- SEGMENT LOCK LOGIC (UPDATED) ---
            if (data.status.activeSegment && data.status.activeSegment !== 1) {
                // Mapping segment numbers to titles
                const segmentTitles = {
                    2: "الفقرة الثانية: آيات بينات",
                    3: "الفقرة الثالثة: اختر بابك",
                    4: "الفقرة الرابعة: التحدي البصري",
                    5: "الفقرة الخامسة: من أكون ؟"
                };
                const currentTitle = segmentTitles[data.status.activeSegment] || "فقرة إضافية";

                return (
                    <div className="fixed inset-0 z-[9999] bg-[#0f172a] flex flex-col items-center justify-center p-4 text-center">
                        <div className="w-48 h-48 bg-indigo-600 rounded-[3rem] flex items-center justify-center shadow-2xl shadow-indigo-500/20 mb-8 logo-breathe">
                            <span className="text-7xl font-black text-white">M</span>
                        </div>
                        <h1 className="text-3xl font-black text-white mb-2">{currentTitle}</h1>
                        <p className="text-indigo-300 font-bold text-lg animate-pulse">تابع التفاعل على الشاشة الرئيسية</p>
                    </div>
                );
            }

            if (!data.status.gameStarted) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-900 text-white space-y-8 animate-fade-in p-4">
                        <div className="w-32 h-32 bg-indigo-600 rounded-[2rem] flex items-center justify-center shadow-2xl shadow-indigo-500/20 mb-6 animate-bounce">
                            <span className="text-5xl font-black">M</span>
                        </div>
                        <div className="text-center space-y-4">
                            <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-tight">مشكاة</h1>
                            <div className="flex flex-col items-center gap-4">
                                <div className="flex items-center gap-3 bg-slate-800/80 backdrop-blur px-8 py-4 rounded-full border border-slate-700 shadow-xl">
                                    <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span>
                                    <span className="font-bold text-slate-300 text-lg waiting-pulse">بانتظار بدء المسابقة...</span>
                                </div>
                                <div className="bg-slate-800/50 px-4 py-2 rounded-xl border border-slate-700/50"><span className="text-slate-500 font-mono text-sm">متسابق #{playerId}</span></div>
                            </div>
                        </div>
                    </div>
                );
            }

            const totalScore = data.status.grandTotals ? data.status.grandTotals[playerId - 1] : (data.status.scores ? data.status.scores[playerId - 1] : 0);

            return (
                <div className="max-w-2xl mx-auto p-4 animate-fade-in flex flex-col min-h-[80vh]">
                    <div className="flex justify-between items-center mb-8">
                        <div className="bg-slate-800 px-6 py-2 rounded-2xl font-bold border border-slate-700 shadow-lg">
                            <span className="text-indigo-400">P{playerId}</span>
                        </div>
                        <div className="bg-emerald-900/30 px-6 py-2 rounded-2xl font-black border border-emerald-700/50 text-emerald-400 shadow-lg">
                            {totalScore} نقطة
                        </div>
                    </div>

                    <div className="bg-slate-800 p-10 rounded-[2rem] border border-slate-700 text-center mb-8 shadow-2xl flex-grow flex items-center justify-center">
                        <h2 className="text-3xl font-bold leading-relaxed">{data.question?.text || "بانتظار السؤال القادم..."}</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        {['A', 'B', 'C', 'D'].map(key => (
                            <button key={key} disabled={!data.status.isVotingOpen && myAnswer !== key} onClick={() => submit(key)}
                                className={`p-6 rounded-2xl border-2 transition-all flex items-center gap-4 text-xl font-bold
                                ${myAnswer === key ? 'bg-indigo-600 border-indigo-400 scale-105 shadow-xl shadow-indigo-500/30' : 'bg-slate-800 border-slate-700'}
                                ${!data.status.isVotingOpen && myAnswer !== key ? 'opacity-40 grayscale-[0.5]' : 'hover:border-indigo-500 active:scale-95'}`}>
                                <span className={`w-10 h-10 rounded-lg flex items-center justify-center ${myAnswer === key ? 'bg-white text-indigo-600' : 'bg-slate-700 text-slate-300'}`}>{key}</span>
                                {data.question?.[key.toLowerCase()] || "---"}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const AdminView = ({ getApiUrl }) => {
            const [status, setStatus] = useState(null);
            const [question, setQuestion] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('control'); // 'control' or 'questions'
            const [qText, setQText] = useState("");

            const fetchStatus = async () => {
                try {
                    const apiUrl = getApiUrl('getStatus', { t: Date.now() });
                    const res = await fetch(apiUrl);
                    const json = await res.json();
                    if (json.success) {
                        setError(null);
                        setStatus(json.data.status);
                        setQuestion(json.data.question);
                    } else { setError(json.error); }
                } catch (e) { setError("خطأ في الاتصال"); }
            };

            useEffect(() => { fetchStatus(); const inv = setInterval(fetchStatus, 2000); return () => clearInterval(inv); }, []);

            const performAction = async (act, params = '') => {
                setLoading(true);
                try {
                    const paramObj = {};
                    if (params) {
                        params.split('&').forEach(p => {
                            if (!p) return;
                            const [k, v] = p.split('=');
                            paramObj[k] = v;
                        });
                    }
                    const apiUrl = getApiUrl(act, paramObj);
                    await fetch(apiUrl);
                    fetchStatus();
                } catch (e) { }
                setLoading(false);
            };

            const handleUpload = async () => {
                if (!qText.trim()) return;
                setLoading(true);
                try {
                    const lines = qText.split('\n').filter(l => l.trim());
                    const questions = lines.map((line, index) => {
                        const parts = line.split('|').map(p => p.trim());
                        return {
                            id: index + 1,
                            text: parts[0] || "",
                            a: parts[1] || "",
                            b: parts[2] || "",
                            c: parts[3] || "",
                            d: parts[4] || "",
                            correct: (parts[5] || "").toUpperCase()
                        };
                    });

                    const res = await fetch('/api/uploadQuestions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ questions })
                    });
                    const json = await res.json();
                    if (json.success) {
                        alert(`تم رفع ${json.count} سؤال بنجاح!`);
                        setQText("");
                        fetchStatus();
                    }
                } catch (e) { alert("خطأ في رفع الأسئلة"); }
                setLoading(false);
            };

            const toggleGameStatus = async (shouldStart) => {
                setLoading(true);
                try {
                    const apiUrl = getApiUrl('setGameStatus', { started: shouldStart, t: Date.now() });
                    await fetch(apiUrl);
                    fetchStatus();
                } catch (e) { }
                setLoading(false);
            };

            if (error) return <div className="p-8 text-center text-rose-500 font-bold bg-slate-900 h-screen flex items-center justify-center">{error}</div>;
            if (!status) return <div className="text-center p-20 text-slate-500 font-bold animate-pulse bg-slate-900 h-screen flex items-center justify-center">جاري التحميل...</div>;

            if (!status.gameStarted) {
                return (
                    <div className="max-w-4xl mx-auto p-8 flex flex-col items-center justify-center min-h-[80vh] animate-fade-in space-y-12 relative">
                        {/* LOADING OVERLAY */}
                        {loading && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm rounded-3xl">
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl flex flex-col items-center gap-4">
                                    <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                                    <span className="font-bold text-emerald-400">جاري بدء المسابقة...</span>
                                </div>
                            </div>
                        )}
                        <div className="w-40 h-40 bg-slate-800 rounded-[2.5rem] flex items-center justify-center mx-auto shadow-2xl border border-slate-700 relative group"><span className="text-7xl group-hover:scale-110 transition-transform duration-500">🚀</span></div>
                        <h2 className="text-5xl font-black text-white tracking-tight">لوحة تحكم مشكاة v5.8</h2>
                        <button onClick={() => toggleGameStatus(true)} disabled={loading} className="w-full max-w-md py-6 bg-emerald-600 hover:bg-emerald-500 text-white text-2xl font-black rounded-3xl shadow-2xl disabled:opacity-50">ابدأ المسابقة</button>
                    </div>
                );
            }

            const correctAnswerChar = status.correctAnswer || '';
            const correctAnswerText = question?.[correctAnswerChar.toLowerCase()] || '---';
            const activeSeg = status.activeSegment || 1;

            return (
                <div className="max-w-6xl mx-auto p-4 space-y-8 animate-fade-in pb-20 relative">
                    {/* LOADING OVERLAY */}
                    {loading && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm rounded-3xl">
                            <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl flex flex-col items-center gap-4">
                                <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                                <span className="font-bold text-indigo-400">جاري تنفيذ الأمر...</span>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <div className="flex gap-4">
                            <button onClick={() => setActiveTab('control')} className={`px-6 py-2 rounded-xl font-bold transition-all ${activeTab === 'control' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>لوحة التحكم</button>
                            <button onClick={() => setActiveTab('questions')} className={`px-6 py-2 rounded-xl font-bold transition-all ${activeTab === 'questions' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>إدارة الأسئلة</button>
                        </div>
                        <button onClick={() => { if (confirm('إنهاء المسابقة؟')) toggleGameStatus(false); }} className="text-xs bg-rose-500/10 text-rose-400 px-3 py-1.5 rounded-lg border border-rose-500/20">إنهاء المسابقة</button>
                    </div>

                    {activeTab === 'questions' ? (
                        <div className="bg-[#1a2333] p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl space-y-6 animate-fade-in">
                            <div className="flex justify-between items-center">
                                <h3 className="text-2xl font-black text-white">رفع الأسئلة محلياً</h3>
                                <div className="text-xs text-slate-500 font-bold">تنسيق: السؤال | خيار أ | خيار ب | خيار ج | خيار د | الإجابة (A/B/C/D)</div>
                            </div>
                            <textarea
                                value={qText}
                                onChange={e => setQText(e.target.value)}
                                placeholder="مثال: ما هو عاصمة فلسطين؟ | القدس | حيفا | يافا | غزة | A"
                                className="w-full h-64 p-6 bg-slate-900 border border-slate-700 rounded-2xl text-white font-bold outline-none focus:border-indigo-500 resize-none"
                            ></textarea>
                            <div className="flex justify-between items-center">
                                <p className="text-xs text-slate-500">ملاحظة: كل سطر يمثل سؤالاً واحداً. استخدم علامة | للفصل بين الأجزاء.</p>
                                <button
                                    onClick={handleUpload}
                                    disabled={loading || !qText.trim()}
                                    className="px-10 py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-2xl shadow-lg shadow-emerald-600/20 transition-all disabled:opacity-50"
                                >
                                    {loading ? 'جاري الرفع...' : 'حفظ الأسئلة في النظام'}
                                </button>
                            </div>
                        </div>
                    ) : (
                        <>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-[#1a2333] p-8 rounded-[2rem] border border-slate-800 shadow-2xl relative overflow-hidden">
                                        <div className="flex justify-between items-start mb-8">
                                            <div className="bg-indigo-600/20 px-4 py-1.5 rounded-xl text-indigo-300 font-black text-sm">سؤال {status.currentQuestionId} / {status.totalQuestions}</div>
                                            <h3 className="text-indigo-400/80 font-bold text-sm tracking-widest">محتوى السؤال</h3>
                                        </div>
                                        <div className="text-center mb-10"><h2 className="text-3xl font-black leading-snug text-white">{question?.text || "لا توجد أسئلة مرفوعة حالياً"}</h2></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {['A', 'B', 'C', 'D'].map(k => {
                                                const isCorrect = status.correctAnswer === k;
                                                return (
                                                    <div key={k} className={`p-4 rounded-2xl border-2 flex items-center justify-between transition-all ${isCorrect ? 'bg-emerald-950/30 border-emerald-500' : 'bg-[#1e293b]/50 border-slate-700'}`}>
                                                        <span className={`font-bold text-lg ${isCorrect ? 'text-white' : 'text-slate-300'}`}>{question?.[k.toLowerCase()] || "---"}</span>
                                                        <span className={`w-10 h-10 rounded-xl flex items-center justify-center font-black ${isCorrect ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-500'}`}>{k}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 bg-[#1a2333] p-4 rounded-2xl border border-slate-800">
                                        <span className="text-slate-400 font-bold whitespace-nowrap">انتقال إلى سؤال:</span>
                                        <select
                                            value={status.currentQuestionId}
                                            onChange={(e) => performAction('setQuestion', `&qId=${e.target.value}`)}
                                            className="flex-grow p-3 bg-slate-900 border border-slate-700 rounded-xl text-white font-bold outline-none focus:border-indigo-500"
                                            disabled={loading}
                                        >
                                            {Array.from({ length: status.totalQuestions }, (_, i) => i + 1).map(q => (
                                                <option key={q} value={q}>السؤال {q}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={() => performAction('prevQuestion')} disabled={loading} className="py-4 bg-slate-800 disabled:opacity-50 hover:bg-slate-700 transition-colors rounded-2xl font-black text-white border border-slate-700">السؤال السابق</button>
                                        <button onClick={() => performAction('nextQuestion')} disabled={loading} className="py-4 bg-slate-800 disabled:opacity-50 hover:bg-slate-700 transition-colors rounded-2xl font-black text-white border border-slate-700">السؤال التالي</button>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => performAction('toggleVoting')} className={`flex-grow py-6 rounded-[2rem] font-black text-2xl text-white ${status.isVotingOpen ? 'bg-rose-600' : 'bg-emerald-600'}`}>{status.isVotingOpen ? 'إيقاف التصويت' : 'بدء التصويت'}</button>
                                        <button onClick={() => performAction('updateScores')} className="w-24 bg-blue-600 rounded-[2rem] font-black text-white flex flex-col items-center justify-center"><span className="text-xl">⚡</span><span className="text-[10px]">احتساب</span></button>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-[#111827] border border-slate-800 p-8 rounded-[2rem] flex flex-col items-center justify-center shadow-2xl border-t-4 border-t-indigo-500">
                                        <h4 className="text-slate-500 font-bold mb-6 text-xs uppercase tracking-widest text-center">حالة التصويت</h4>
                                        <div className={`w-32 h-32 rounded-full flex items-center justify-center border-4 transition-all duration-500 ${status.isVotingOpen ? 'border-emerald-500 bg-emerald-500/10 animate-pulse' : 'border-slate-700 bg-slate-800'}`}>
                                            <span className={`text-4xl ${status.isVotingOpen ? 'text-emerald-500' : 'text-slate-600'}`}>
                                                {status.isVotingOpen ? '●' : '○'}
                                            </span>
                                        </div>
                                        <p className={`mt-4 font-bold text-sm ${status.isVotingOpen ? 'text-emerald-400' : 'text-slate-500'}`}>
                                            {status.isVotingOpen ? 'التصويت مفتوح' : 'التصويت مغلق'}
                                        </p>
                                    </div>
                                    <div className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700 flex items-center gap-4">
                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-2xl font-black text-white ${correctAnswerChar ? 'bg-emerald-500' : 'bg-rose-500'}`}>{correctAnswerChar || '?'}</div>
                                        <div className="text-xs font-bold text-slate-300">{correctAnswerText}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-[#111827]/50 p-8 rounded-[2.5rem] border border-slate-800 shadow-xl space-y-8">
                                <div className="flex justify-between items-center">
                                    <h4 className="text-slate-400 font-black text-sm uppercase tracking-[0.2em]">مراقبة المتسابقين الحية</h4>
                                </div>
                                <div className="grid grid-cols-4 md:grid-cols-8 gap-6">
                                    {status.playerAnswers.map((ans, i) => {
                                        const hasAnswer = !!ans;
                                        const isCorrect = hasAnswer && status.correctAnswer && ans === status.correctAnswer;
                                        const score = status.grandTotals ? status.grandTotals[i] : (status.scores ? status.scores[i] : 0);
                                        const isSelectedBlue = status.selection?.blue?.[i] === 1;
                                        const isSelectedGreen = status.selection?.green?.[i] === 1;

                                        let boxStyles = "bg-slate-900 border-slate-800 text-slate-700";
                                        if (isCorrect) boxStyles = "bg-emerald-500 border-emerald-400 text-white scale-110 shadow-emerald-500/30 ring-4 ring-emerald-500/10";
                                        else if (hasAnswer) boxStyles = "bg-indigo-600 border-indigo-400 text-white";

                                        return (
                                            <div key={i} className="flex flex-col items-center gap-3">
                                                <div onClick={() => performAction('toggleSelect', `&playerId=${i + 1}`)}
                                                    className={`w-14 h-14 rounded-2xl flex items-center justify-center text-2xl font-black border-2 transition-all cursor-pointer relative group ${boxStyles}`}>
                                                    {ans || '-'}
                                                    <div className="absolute -top-1 -right-1 flex gap-1">
                                                        {isSelectedBlue && <div className="w-3 h-3 bg-blue-500 rounded-full border border-white shadow-sm"></div>}
                                                        {isSelectedGreen && <div className="w-3 h-3 bg-emerald-500 rounded-full border border-white shadow-sm"></div>}
                                                    </div>
                                                    <div className="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 rounded-2xl transition-opacity"></div>
                                                </div>
                                                <div className="flex flex-col items-center w-full">
                                                    <span className="text-[10px] font-black text-slate-600 mb-1">P{i + 1}</span>
                                                    <div className="w-full bg-slate-800 rounded-md h-6 border border-slate-700 flex items-center justify-center">
                                                        <span className="text-xs text-emerald-400 font-black">{score}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="flex justify-center mt-4">
                                    <button onClick={() => performAction('commitSelection')}
                                        className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-black shadow-lg shadow-blue-500/20 flex items-center gap-3 transition-all active:scale-95">
                                        <span>تفعيل الاختيار المسبق (Blue ➔ Green)</span>
                                        <span className="bg-white/20 px-2 py-0.5 rounded text-[10px]">vMix Sync</span>
                                    </button>
                                </div>

                                <div className="border-t border-slate-800 pt-8">
                                    <h4 className="text-slate-400 font-black text-sm uppercase tracking-[0.2em] mb-6">لوحة تحكم الفقرات (Segments Control)</h4>

                                    <div className="flex flex-wrap gap-2 mb-6 bg-slate-800/50 p-4 rounded-xl border border-slate-700 items-center">
                                        <span className="text-xs font-bold text-slate-500 ml-4">اختر الفقرة النشطة:</span>

                                        <button onClick={() => performAction('setActiveSegment', '&segment=1')}
                                            className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeSeg == 1 ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-700 text-slate-400'}`}>
                                            الفقرة 1 (اختر صح)
                                        </button>

                                        <button onClick={() => performAction('setActiveSegment', '&segment=2')}
                                            className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeSeg == 2 ? 'bg-amber-600 text-white shadow-lg' : 'bg-slate-700 text-slate-400'}`}>
                                            الفقرة 2 (آيات بينات)
                                        </button>

                                        <button onClick={() => performAction('setActiveSegment', '&segment=3')}
                                            className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeSeg == 3 ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-700 text-slate-400'}`}>
                                            الفقرة 3 (اختر بابك)
                                        </button>

                                        <button onClick={() => performAction('setActiveSegment', '&segment=4')}
                                            className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeSeg == 4 ? 'bg-purple-600 text-white shadow-lg' : 'bg-slate-700 text-slate-400'}`}>
                                            الفقرة 4 (التحدي البصري)
                                        </button>

                                        <button onClick={() => performAction('setActiveSegment', '&segment=5')}
                                            className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeSeg == 5 ? 'bg-rose-600 text-white shadow-lg' : 'bg-slate-700 text-slate-400'}`}>
                                            الفقرة 5 (من أكون ؟)
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">
                                        {[1, 2, 3, 4, 5, 6, 7, 8].map(pid => (
                                            <div key={pid} className="bg-slate-800 p-3 rounded-xl border border-slate-700 flex flex-col gap-2 relative">
                                                <div className="text-center font-bold text-slate-500 text-xs mb-1">المتسابق {pid}</div>

                                                <button
                                                    onClick={() => performAction('addSeg2', `&playerId=${pid}`)}
                                                    disabled={activeSeg != 2}
                                                    className={`text-[10px] py-1.5 rounded border font-bold transition-all ${activeSeg == 2 ? 'bg-emerald-900/50 hover:bg-emerald-800 text-emerald-400 border-emerald-800 cursor-pointer' : 'bg-slate-800 text-slate-600 border-slate-700 cursor-not-allowed opacity-30'}`}>
                                                    آيات بينات (+20)
                                                </button>

                                                <button
                                                    onClick={() => performAction('addSeg3', `&playerId=${pid}`)}
                                                    disabled={activeSeg != 3}
                                                    className={`text-[10px] py-1.5 rounded border font-bold transition-all ${activeSeg == 3 ? 'bg-blue-900/50 hover:bg-blue-800 text-blue-400 border-blue-800 cursor-pointer' : 'bg-slate-800 text-slate-600 border-slate-700 cursor-not-allowed opacity-30'}`}>
                                                    اختر بابك (+10)
                                                </button>

                                                <button
                                                    onClick={() => performAction('addSeg4', `&playerId=${pid}`)}
                                                    disabled={activeSeg != 4}
                                                    className={`text-[10px] py-1.5 rounded border font-bold transition-all ${activeSeg == 4 ? 'bg-purple-900/50 hover:bg-purple-800 text-purple-400 border-purple-800 cursor-pointer' : 'bg-slate-800 text-slate-600 border-slate-700 cursor-not-allowed opacity-30'}`}>
                                                    تحدي بصري (+25)
                                                </button>

                                                <button
                                                    onClick={() => { const pts = prompt('أدخل النقاط (يمكن بالسالب):'); if (pts) performAction('addSeg5', `&playerId=${pid}&points=${pts}`); }}
                                                    disabled={activeSeg != 5}
                                                    className={`text-[10px] py-1.5 rounded border font-bold transition-all ${activeSeg == 5 ? 'bg-rose-900/50 hover:bg-rose-800 text-rose-400 border-rose-800 cursor-pointer' : 'bg-slate-800 text-slate-600 border-slate-700 cursor-not-allowed opacity-30'}`}>
                                                    من أكون ؟ (?)
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 mt-4 justify-end">
                                        <button onClick={() => { if (confirm('هل أنت متأكد من تصفير نقاط الفقرة 2 للجميع؟')) performAction('resetSegment', '&segment=2') }} className="text-[10px] text-slate-500 hover:text-white px-2">تصفير S2</button>
                                        <button onClick={() => { if (confirm('هل أنت متأكد من تصفير نقاط الفقرة 3 للجميع؟')) performAction('resetSegment', '&segment=3') }} className="text-[10px] text-slate-500 hover:text-white px-2">تصفير S3</button>
                                        <button onClick={() => { if (confirm('هل أنت متأكد من تصفير نقاط الفقرة 4 للجميع؟')) performAction('resetSegment', '&segment=4') }} className="text-[10px] text-slate-500 hover:text-white px-2">تصفير S4</button>
                                        <button onClick={() => { if (confirm('هل أنت متأكد من تصفير نقاط الفقرة 5 للجميع؟')) performAction('resetSegment', '&segment=5') }} className="text-[10px] text-slate-500 hover:text-white px-2">تصفير S5</button>
                                    </div>
                                </div>

                                <div className="border-t border-slate-800 pt-8 mt-6">
                                    <h4 className="text-slate-400 font-black text-sm uppercase tracking-[0.2em] mb-6">تحكم شاشة العرض (vMix Live View)</h4>
                                    <div className="flex flex-wrap gap-3">
                                        <button onClick={() => performAction('setView', '&view=seg1')} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg font-bold flex-grow md:flex-grow-0">عرض اختر صح</button>
                                        <button onClick={() => performAction('setView', '&view=seg2')} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg font-bold flex-grow md:flex-grow-0">عرض آيات بينات</button>
                                        <button onClick={() => performAction('setView', '&view=seg3')} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg font-bold flex-grow md:flex-grow-0">عرض اختر بابك</button>
                                        <button onClick={() => performAction('setView', '&view=seg4')} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg font-bold flex-grow md:flex-grow-0">عرض التحدي البصري</button>
                                        <button onClick={() => performAction('setView', '&view=seg5')} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg font-bold flex-grow md:flex-grow-0">عرض من أكون ؟</button>
                                        <div className="flex-grow"></div>
                                        <button onClick={() => performAction('setView', '&view=total')} className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-lg font-bold shadow-lg shadow-indigo-500/20 flex-grow md:flex-grow-0">عرض المجموع الكلي</button>
                                    </div>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const SetupView = ({ onGo, isLocal, setIsLocal, url, setUrl, hasEnvConfig }) => {
            const [pId, setPId] = useState(1);
            const [showPass, setShowPass] = useState(false);
            const [pass, setPass] = useState("");
            const handleGo = (m, p) => {
                if (!isLocal && !url) {
                    alert("يرجى إدخال رابط Google Script أو تفعيل الوضع المحلي");
                    return;
                }
                onGo(url, m, p);
            };
            return (
                <div className="max-w-md mx-auto py-20 px-4 animate-fade-in">
                    <div className="bg-slate-800 p-8 rounded-[2rem] border border-slate-700 shadow-2xl space-y-6">
                        <div className="text-center"><h1 className="text-3xl font-black text-indigo-400">نظام مشكاة للمسابقات</h1><p className="text-slate-500 text-xs mt-2">v5.9 Local Edition</p></div>

                        {!hasEnvConfig && (
                            <>
                                <div className="flex items-center justify-between p-4 bg-slate-900 rounded-2xl border border-slate-700">
                                    <span className="text-slate-300 font-bold">الوضع المحلي (Offline)</span>
                                    <button
                                        onClick={() => setIsLocal(!isLocal)}
                                        className={`w-14 h-8 rounded-full transition-all relative ${isLocal ? 'bg-emerald-500' : 'bg-slate-700'}`}
                                    >
                                        <div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all ${isLocal ? 'left-7' : 'left-1'}`}></div>
                                    </button>
                                </div>

                                {!isLocal && (
                                    <div className="space-y-2 animate-fade-in">
                                        <label className="text-xs font-bold text-slate-400 block px-1 text-right">رابط Google Script</label>
                                        <input type="text" value={url} onChange={e => setUrl(e.target.value)} placeholder="https://script.google.com/..." className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white text-left font-mono text-xs outline-none focus:border-indigo-500" dir="ltr" />
                                    </div>
                                )}
                            </>
                        )}
                        {!showPass ? (
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => setShowPass(true)} className="py-4 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold transition-all text-white shadow-lg shadow-indigo-600/20">دخول كمسؤول</button>
                                <div className="flex flex-col gap-2">
                                    <select value={pId} onChange={e => setPId(parseInt(e.target.value))} className="p-2 bg-slate-900 border border-slate-700 rounded-lg text-white">
                                        {[1, 2, 3, 4, 5, 6, 7, 8].map(n => <option key={n} value={n}>متسابق {n}</option>)}
                                    </select>
                                    <button onClick={() => handleGo('PLAYER', pId)} className="py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold text-white">دخول كمتسابق</button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <input type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="كلمة المرور" className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white text-center text-xl outline-none" autoFocus onKeyDown={e => e.key === 'Enter' && (pass === ADMIN_PASSWORD ? handleGo('ADMIN') : alert("خطأ"))} />
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setShowPass(false)} className="py-3 bg-slate-700 rounded-xl font-bold text-white">رجوع</button>
                                    <button onClick={() => pass === ADMIN_PASSWORD ? handleGo('ADMIN') : alert("خطأ")} className="py-3 bg-indigo-600 rounded-xl font-bold text-white shadow-lg shadow-indigo-600/20">تأكيد</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('SETUP');
            const [url, setUrl] = useState(ENV_GAS_URL);
            const [pId, setPId] = useState(null);
            const [isLocal, setIsLocal] = useState(ENV_IS_LOCAL);

            useEffect(() => {
                const savedUrl = ENV_GAS_URL || localStorage.getItem('gas_url');
                const savedMode = localStorage.getItem('mishkat_mode');
                const savedPId = localStorage.getItem('mishkat_pid');
                const savedIsLocal = localStorage.getItem('mishkat_is_local');

                if (savedUrl) setUrl(savedUrl);
                if (savedMode) setMode(savedMode);
                if (savedPId) setPId(parseInt(savedPId));

                if (ENV_GAS_URL !== "") {
                    setIsLocal(ENV_IS_LOCAL);
                } else if (savedIsLocal !== null) {
                    setIsLocal(savedIsLocal === 'true');
                }
            }, []);

            const onGo = (u, m, p) => {
                setUrl(u);
                setMode(m);
                setPId(p);

                if (u) localStorage.setItem('gas_url', u);
                localStorage.setItem('mishkat_mode', m);
                if (p) localStorage.setItem('mishkat_pid', p);
                else localStorage.removeItem('mishkat_pid');
                localStorage.setItem('mishkat_is_local', isLocal);
            };

            const handleLogout = () => {
                setMode('SETUP');
                localStorage.removeItem('mishkat_mode');
                localStorage.removeItem('mishkat_pid');
            };

            const getApiUrl = (action, params = {}) => {
                if (isLocal) {
                    const searchParams = new URLSearchParams(params);
                    return `/api/${action}?${searchParams.toString()}`;
                }
                const searchParams = new URLSearchParams({ action, ...params });
                return `${url}?${searchParams.toString()}`;
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-900">
                    <nav className="bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800 p-4 sticky top-0 z-50 flex justify-between items-center">
                        <div className="text-xl font-black text-indigo-400 tracking-tighter flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-sm">M</div>
                            MISHKAH <span className="text-[10px] bg-indigo-500/20 px-2 py-0.5 rounded text-indigo-300">v5.9</span>
                        </div>
                        {mode !== 'SETUP' && <button onClick={handleLogout} className="text-xs bg-slate-800 px-4 py-2 rounded-xl text-slate-400 hover:text-white border border-slate-700 transition-all">إنهاء الجلسة</button>}
                    </nav>
                    <div className="flex-grow">
                        {mode === 'SETUP' && <SetupView onGo={onGo} isLocal={isLocal} setIsLocal={setIsLocal} url={url} setUrl={setUrl} hasEnvConfig={HAS_ENV_CONFIG} />}
                        {mode === 'ADMIN' && <AdminView getApiUrl={getApiUrl} />}
                        {mode === 'PLAYER' && <PlayerView getApiUrl={getApiUrl} playerId={pId} />}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
